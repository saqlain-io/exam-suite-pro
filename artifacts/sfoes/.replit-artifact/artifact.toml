kind = "web"
previewPath = "/"
title = "SFOES - Sehhat Foundation Online Exam System"
version = "1.0.0"
id = "artifacts/sfoes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18536

[services.development]
run = "pnpm --filter @workspace/sfoes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sfoes", "run", "build" ]
publicDir = "artifacts/sfoes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18536"
BASE_PATH = "/"
